services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petshop_app
    restart: unless-stopped
    ports:
      - "15000:15000"
    volumes:
      - .:/app
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:15000
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=petshop_db
      - DB_USERNAME=petshop_user
      - DB_PASSWORD=secret_password
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:15000"]
      interval: 30s
      timeout: 10s
      retries: 5

  vite:
    image: node:22-alpine
    container_name: petshop_vite
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev -- --host"

  db:
    image: mysql:8.0
    container_name: petshop_db
    restart: unless-stopped
    ports:
      - "15002:3306"
    environment:
      MYSQL_DATABASE: petshop_db
      MYSQL_USER: petshop_user
      MYSQL_PASSWORD: secret_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: petshop_phpmyadmin
    restart: unless-stopped
    ports:
      - "15001:80"
    environment:
      - PMA_HOST=db
      - PMA_USER=root
      - PMA_PASSWORD=root_password
    depends_on:
      - db

volumes:
  mysql_data:
